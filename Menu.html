<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Menu</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 id="title">Restaurant</h1>
    <p id="welcome">Добро пожаловать!</p>

    <div class="languages">
        <button onclick="changeLanguage('ru')">🇷🇺 Рус</button>
        <button onclick="changeLanguage('kz')">🇰🇿 Қаз</button>
        <button onclick="changeLanguage('en')">🇬🇧 Eng</button>
    </div>
</header>

<section class="menu">

<div class="card">
🍔
<h2 id="burger">Бургеры</h2>
</div>

<div class="card">
🍕
<h2 id="pizza">Пицца</h2>
</div>

<div class="card">
🥩
<h2 id="meat">Горячие блюда</h2>
</div>

<div class="card">
🥗
<h2 id="salad">Салаты</h2>
</div>

<div class="card">
🍰
<h2 id="dessert">Десерты</h2>
</div>

<div class="card">
🥤
<h2 id="drink">Напитки</h2>
</div>

</section>

<div class="pdf">
<a href="menu.pdf" target="_blank" id="pdf">📄 Открыть полное меню (PDF)</a>
</div>

<script src="script.js"></script>

</body>
</html>
